version: '3.8'

services:
  app:
    build: .
    container_name: inscripcion-cursos
    ports:
      - "8080:8080"
    environment:
      - ORACLE_DB_URL=jdbc:oracle:thin:@tu_host:1521/tu_servicio
      - ORACLE_DB_USERNAME=tu_usuario
      - ORACLE_DB_PASSWORD=tu_password
    restart: unless-stopped
