spring.application.name=inscripcion-cursos

# Server
server.port=8080

# Oracle Cloud Database
spring.datasource.url=${ORACLE_DB_URL:jdbc:oracle:thin:@adb.sa-santiago-1.oraclecloud.com:1522/g09fdb46c680fe1_inscripcioncursos_tp.adb.oraclecloud.com}
spring.datasource.username=${ORACLE_DB_USERNAME:ADMIN}
spring.datasource.password=${ORACLE_DB_PASSWORD:COMPLETAR_CON_TU_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Hikari Pool (timeouts cortos para no quedarse colgado)
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
