spring.application.name=inscripcion-cursos

# Server
server.port=8080

# Oracle Cloud Database - InscripcionCursos
# NOTA: Cambiar 'tcp' por 'tcps' y puerto 1522 para conexion TLS sin wallet
spring.datasource.url=${ORACLE_DB_URL:jdbc:oracle:thin:@(description=(retry_count=20)(retry_delay=3)(address=(protocol=tcps)(port=1522)(host=adb.sa-santiago-1.oraclecloud.com))(connect_data=(service_name=g09fdb46c680fe1_inscripcioncursos_tp.adb.oraclecloud.com))(security=(ssl_server_dn_match=yes)))}
spring.datasource.username=${ORACLE_DB_USERNAME:ADMIN}
spring.datasource.password=${ORACLE_DB_PASSWORD:OracleCloud2024!}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
